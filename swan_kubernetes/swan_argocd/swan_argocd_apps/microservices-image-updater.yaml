---
apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: microservices
  namespace: argocd
spec:
  namespace: argocd
  commonUpdateSettings:
    updateStrategy: newest-build
  writeBackConfig:
    method: "git:secret:argocd/git-creds"
    gitConfig:
      repository: https://github.com/swanpyaetun/swan_retail-store-sample-app.git
      branch: main
      writeBackTarget: helmvalues:./values.yaml
  applicationRefs:
    - namePattern: cart
      images:
        - alias: cart
          imageName: 655355946217.dkr.ecr.ap-southeast-1.amazonaws.com/swan_retail-store-sample-app/cart
          manifestTargets:
            helm:
              name: image.repository
              tag: image.tag
    - namePattern: catalog
      images:
        - alias: catalog
          imageName: 655355946217.dkr.ecr.ap-southeast-1.amazonaws.com/swan_retail-store-sample-app/catalog
          manifestTargets:
            helm:
              name: image.repository
              tag: image.tag
    - namePattern: checkout
      images:
        - alias: checkout
          imageName: 655355946217.dkr.ecr.ap-southeast-1.amazonaws.com/swan_retail-store-sample-app/checkout
          manifestTargets:
            helm:
              name: image.repository
              tag: image.tag
    - namePattern: orders
      images:
        - alias: orders
          imageName: 655355946217.dkr.ecr.ap-southeast-1.amazonaws.com/swan_retail-store-sample-app/orders
          manifestTargets:
            helm:
              name: image.repository
              tag: image.tag
    - namePattern: ui
      images:
        - alias: ui
          imageName: 655355946217.dkr.ecr.ap-southeast-1.amazonaws.com/swan_retail-store-sample-app/ui
          manifestTargets:
            helm:
              name: image.repository
              tag: image.tag